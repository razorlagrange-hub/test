<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>corridor</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  #hint { position:fixed; bottom:8%; left:50%; transform:translateX(-50%); color:#333; font-size:8px; letter-spacing:.3em; text-transform:uppercase; opacity:0; transition:opacity 1.5s ease; pointer-events:none; z-index:10; }
  #hint.show { opacity:1; }
</style>
</head>
<body>
  <div class="fade-cover" id="fi"></div>
  <canvas id="c"></canvas>
  <div id="hint">walk forward</div>
<script>
(function(){
  const cv=document.getElementById('c'),cx=cv.getContext('2d');
  const hint=document.getElementById('hint');
  const fi=document.getElementById('fi');
  let W,H,t=0,audioCtx=null,neonSrc=null;

  function resize(){W=window.innerWidth;H=window.innerHeight;cv.width=W;cv.height=H;}
  resize();
  setTimeout(()=>fi.classList.add('done'),100);
  setTimeout(()=>hint.classList.add('show'),1800);

  function initNeon(){
    if(audioCtx)return;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const bufSize=audioCtx.sampleRate*2;
    const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) d[i]=Math.random()*2-1;
    neonSrc=audioCtx.createBufferSource();
    neonSrc.buffer=buf;neonSrc.loop=true;
    const f1=audioCtx.createBiquadFilter();f1.type='bandpass';f1.frequency.value=120;f1.Q.value=12;
    const f2=audioCtx.createBiquadFilter();f2.type='bandpass';f2.frequency.value=60;f2.Q.value=8;
    const gain=audioCtx.createGain();gain.gain.value=0.04;
    neonSrc.connect(f1);f1.connect(f2);f2.connect(gain);gain.connect(audioCtx.destination);
    neonSrc.start();
  }

  cv.addEventListener('click',e=>{
    initNeon();
    const dx=e.offsetX-W/2, dy=e.offsetY-H/2;
    // clickable zone: center, upper half
    if(Math.abs(dx)<W*.18 && dy<0 && dy>-H*.38){
      cv.style.transition='opacity .6s';cv.style.opacity='0';
      hint.style.opacity='0';
      setTimeout(()=>{ window.location.href='couloir-h.html'; },600);
    }
  });

  cv.addEventListener('mousemove',e=>{
    const dx=e.offsetX-W/2, dy=e.offsetY-H/2;
    cv.style.cursor=(Math.abs(dx)<W*.18 && dy<0 && dy>-H*.38)?'pointer':'default';
  });

  function draw(){
    cx.clearRect(0,0,W,H);
    const cxW=W/2, cyH=H/2;
    cx.fillStyle='#100d08';cx.fillRect(0,0,W,H);

    const vx=cxW, vy=cyH*.55;

    // LEFT WALL
    cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,H);cx.lineTo(cxW*.22,H);cx.lineTo(vx,vy);cx.closePath();
    cx.fillStyle='#1c1710';cx.fill();
    // RIGHT WALL
    cx.beginPath();cx.moveTo(W,0);cx.lineTo(W,H);cx.lineTo(W-cxW*.22,H);cx.lineTo(vx,vy);cx.closePath();
    cx.fillStyle='#181408';cx.fill();
    // CEILING
    cx.beginPath();cx.moveTo(0,0);cx.lineTo(W,0);cx.lineTo(vx,vy);cx.closePath();
    const cg=cx.createLinearGradient(0,0,0,vy);cg.addColorStop(0,'#0c0a07');cg.addColorStop(1,'#181410');
    cx.fillStyle=cg;cx.fill();
    // FLOOR — red carpet
    cx.beginPath();cx.moveTo(0,H);cx.lineTo(W,H);cx.lineTo(vx,vy);cx.closePath();
    const fg=cx.createLinearGradient(0,vy,0,H);
    fg.addColorStop(0,'#1e0808');fg.addColorStop(.3,'#2a0c0c');fg.addColorStop(.7,'#360e0e');fg.addColorStop(1,'#3e1010');
    cx.fillStyle=fg;cx.fill();

    // perspective lines floor
    for(let i=0;i<=10;i++){cx.beginPath();cx.moveTo(vx,vy);cx.lineTo(W*i/10,H);cx.strokeStyle='rgba(50,12,12,.4)';cx.lineWidth=.5;cx.stroke();}
    for(let j=1;j<8;j++){
      const p=Math.pow(j/8,1.4),y=vy+(H-vy)*p,hw=(cxW-cxW*.22*(1-p))*p+(cxW*.22*(1-p));
      cx.beginPath();cx.moveTo(cxW-hw*.9,y);cx.lineTo(cxW+hw*.9,y);cx.strokeStyle=`rgba(45,10,10,${.25+p*.2})`;cx.lineWidth=.4;cx.stroke();
    }

    // NEON TUBES
    const nF=.7+Math.sin(t*1.8)*.06+Math.sin(t*11.3)*.03+Math.sin(t*31)*.015;
    for(let n=0;n<5;n++){
      const p=Math.pow((n+1)/5,1.3);
      const nW=(W-cxW*.44)*.55*(1-p)+12;
      const nX=cxW-nW/2;
      const nY=vy+(H*.04)*(1-p)+H*.005;
      cx.fillStyle=`rgba(200,200,180,${(.35+p*.1)*nF})`;
      cx.fillRect(nX,nY,nW,2*(1-p)+.5);
      // diffuse halo — no visible spot
      const hg=cx.createRadialGradient(cxW,nY,0,cxW,nY,nW*.7);
      hg.addColorStop(0,`rgba(180,170,130,${.06*(1-p*.3)*nF})`);
      hg.addColorStop(.5,`rgba(140,130,90,${.025*(1-p*.3)*nF})`);
      hg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=hg;cx.fillRect(nX-nW*.3,nY,nW*1.6,(H-nY)*.6*(1-p*.5));
    }

    // diffuse ambient
    const diff=cx.createRadialGradient(cxW,vy,10,cxW,cyH,H*.6);
    diff.addColorStop(0,`rgba(160,148,100,${.07*nF})`);diff.addColorStop(.4,`rgba(100,90,55,${.03*nF})`);diff.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=diff;cx.fillRect(0,0,W,H);

    // end of corridor glow — clickable hint
    const eg=cx.createRadialGradient(vx,vy,0,vx,vy,W*.15);
    eg.addColorStop(0,'rgba(180,160,90,.08)');eg.addColorStop(.5,'rgba(120,100,50,.03)');eg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=eg;cx.beginPath();cx.arc(vx,vy,W*.2,0,Math.PI*2);cx.fill();

    // door at end
    const eW=W*.06,eH=H*.12,eX=vx-eW/2,eY=vy-eH*.3;
    cx.fillStyle='rgba(8,6,4,.85)';cx.fillRect(eX,eY,eW,eH);
    cx.strokeStyle='rgba(60,48,22,.4)';cx.lineWidth=.6;cx.strokeRect(eX,eY,eW,eH);

    cx.fillStyle='rgba(100,75,25,.006)';cx.fillRect(0,(t*15)%H,W,1);

    const vig=cx.createRadialGradient(cxW,cyH,H*.08,cxW,cyH,H*.8);
    vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.92)');
    cx.fillStyle=vig;cx.fillRect(0,0,W,H);
  }

  function loop(){t+=.016;resize();draw();requestAnimationFrame(loop);}
  loop();
})();
</script>
</body>
</html>
