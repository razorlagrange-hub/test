<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>room 1</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { background:#000; }

  #clickScreen {
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
    cursor:pointer;
    transition:opacity 0.8s ease;
  }
  #clickScreen.hide { opacity:0; pointer-events:none; }
  #clickScreen span {
    color:rgba(255,255,255,0.3);
    font-family:'Courier New',monospace;
    font-size:10px;
    letter-spacing:0.4em;
    text-transform:uppercase;
  }

  /* video sits inside screen area */
  #videoWrap {
    position:fixed;
    z-index:3;
    pointer-events:none;
  }
  #videoWrap video {
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  #back {
    position:fixed;
    bottom:5%; left:5%;
    color:rgba(255,255,255,0.2);
    font-size:9px;
    letter-spacing:0.25em;
    text-transform:uppercase;
    cursor:pointer;
    z-index:20;
    text-decoration:none;
    font-family:'Courier New',monospace;
    transition:color 0.3s;
  }
  #back:hover { color:rgba(255,255,255,0.6); }
</style>
</head>
<body>
  <div class="fade-cover" id="fi"></div>
  <div id="clickScreen"><span>click to enter</span></div>
  <canvas id="c"></canvas>
  <div id="videoWrap">
    <video id="vid" autoplay loop playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
  <a id="back" href="hallway.html">← back</a>

<script>
(function(){
  const cv=document.getElementById('c'),cx=cv.getContext('2d');
  const fi=document.getElementById('fi');
  const vid=document.getElementById('vid');
  const videoWrap=document.getElementById('videoWrap');
  let W,H,t=0;

  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    cv.width=W;cv.height=H;

    // screen dimensions — same as other rooms
    const sw=W*0.88,sh=sw*0.52;
    const sx=W/2-sw/2,sy=H*0.02;

    // position video wrap exactly over screen area
    videoWrap.style.left=sx+'px';
    videoWrap.style.top=sy+'px';
    videoWrap.style.width=sw+'px';
    videoWrap.style.height=sh+'px';
  }
  resize();
  setTimeout(()=>fi.classList.add('done'),100);

  // click screen — unlock audio and start video
  const clickScreen=document.getElementById('clickScreen');
  vid.muted=true;
  clickScreen.addEventListener('click',()=>{
    vid.muted=false;
    vid.volume=0.85;
    vid.play();
    clickScreen.classList.add('hide');
    setTimeout(()=>clickScreen.remove(),900);
  },{once:true});

  function drawSeat(x,y,sw,sh,lit){
    const g=cx.createLinearGradient(x-sw/2,y-sh,x+sw/2,y);
    g.addColorStop(0,`rgb(${80+lit*70|0},${8+lit*10|0},8)`);
    g.addColorStop(1,`rgb(${32+lit*18|0},4,4)`);
    cx.beginPath();cx.moveTo(x-sw*.46,y);cx.lineTo(x+sw*.46,y);cx.lineTo(x+sw*.42,y-sh*.74);cx.lineTo(x-sw*.42,y-sh*.74);cx.closePath();cx.fillStyle=g;cx.fill();
    cx.beginPath();cx.ellipse(x,y-sh*.72,sw*.38,sh*.06,0,0,Math.PI*2);cx.fillStyle=`rgb(${68+lit*55|0},8,8)`;cx.fill();
    cx.beginPath();cx.moveTo(x-sw*.4,y-sh*.4);cx.lineTo(x+sw*.4,y-sh*.4);cx.strokeStyle=`rgba(${38+lit*28|0},4,4,.7)`;cx.lineWidth=1.3;cx.stroke();
    cx.fillStyle=`rgba(${22+lit*12|0},3,3,.95)`;cx.fillRect(x-sw*.54,y-sh*.4,sw*.1,sh*.22);cx.fillRect(x+sw*.44,y-sh*.4,sw*.1,sh*.22);
    cx.beginPath();cx.moveTo(x-sw*.46,y);cx.lineTo(x+sw*.46,y);cx.lineTo(x+sw*.46,y-sh*.2);cx.lineTo(x-sw*.46,y-sh*.2);cx.closePath();cx.fillStyle=`rgb(${48+lit*32|0},5,5)`;cx.fill();
  }

  function draw(){
    cx.clearRect(0,0,W,H);
    const cxW=W/2;
    cx.fillStyle='#000';cx.fillRect(0,0,W,H);

    const sw=W*0.88,sh=sw*0.52;
    const sx=cxW-sw/2,sy=H*0.02;

    // screen frame
    cx.fillStyle='#100c06';cx.fillRect(sx-12,sy-8,sw+24,sh+16);
    cx.fillStyle='#060402';cx.fillRect(sx-5,sy-4,sw+10,sh+8);

    // video glow — light from screen onto room
    // sample approximate color (warm if video is bright)
    const flickerBase=0.88+Math.sin(t*0.5)*0.06;
    const sGlow=cx.createRadialGradient(cxW,sy+sh*0.5,0,cxW,sy+sh,W*0.9);
    sGlow.addColorStop(0,`rgba(180,165,130,${0.10*flickerBase})`);
    sGlow.addColorStop(0.35,`rgba(130,115,85,${0.04*flickerBase})`);
    sGlow.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=sGlow;cx.fillRect(0,0,W,H);

    // room bg
    cx.fillStyle='#060402';cx.fillRect(0,sy+sh+8,W,H-(sy+sh+8));

    // wall slivers beside screen
    cx.fillStyle='#0a0704';
    if(sx>0) cx.fillRect(0,sy,sx,sh+8);
    if(sx+sw<W) cx.fillRect(sx+sw,sy,W-(sx+sw),sh+8);

    // ceiling
    cx.fillStyle='#060402';cx.fillRect(0,0,W,sy);

    // single seat row
    const rowY=H*0.99,seatW=W*0.115,seatH=H*0.34;
    const litAmt=0.14*flickerBase;
    for(let s=0;s<7;s++) drawSeat(W/7*.5+s*W/7,rowY,seatW,seatH,litAmt);

    // bottom fade
    const botG=cx.createLinearGradient(0,H*0.84,0,H);
    botG.addColorStop(0,'rgba(0,0,0,0)');botG.addColorStop(1,'rgba(0,0,0,0.97)');
    cx.fillStyle=botG;cx.fillRect(0,H*0.84,W,H*0.16);

    // vignette
    const vig=cx.createRadialGradient(cxW,H*0.32,H*0.1,cxW,H*0.5,H*0.85);
    vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.86)');
    cx.fillStyle=vig;cx.fillRect(0,0,W,H);
  }

  window.addEventListener('resize',resize);
  function loop(){t+=0.016;resize();draw();requestAnimationFrame(loop);}
  loop();
})();
</script>
</body>
</html>
