<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>corridor</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  #hint {
    position: fixed;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    color: #3a2e20;
    font-size: 8px;
    letter-spacing: 0.3em;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 2s ease;
    pointer-events: none;
    z-index: 10;
  }
  #hint.show { opacity: 1; }
</style>
</head>
<body>
  <div class="fade-cover" id="fi"></div>
  <canvas id="c"></canvas>
  <div id="hint">walk forward</div>
<script>
(function(){
  const cv = document.getElementById('c');
  const cx = cv.getContext('2d');
  const hint = document.getElementById('hint');
  const fi = document.getElementById('fi');
  let W, H, t = 0;

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    cv.width = W; cv.height = H;
  }
  resize();

  setTimeout(()=> fi.classList.add('done'), 100);
  setTimeout(()=> hint.classList.add('show'), 2000);

  cv.addEventListener('mousemove', e => {
    const vy = H/2*0.52, rW = W*0.10, rH = H*0.18;
    const rX = W/2-rW/2, rY = vy-rH*0.55;
    const over = e.offsetX>rX && e.offsetX<rX+rW && e.offsetY>rY && e.offsetY<rY+rH;
    cv.style.cursor = over ? 'pointer' : 'default';
  });

  cv.addEventListener('click', e => {
    const vy = H/2*0.52, rW = W*0.10, rH = H*0.18;
    const rX = W/2-rW/2, rY = vy-rH*0.55;
    if(e.offsetX>rX && e.offsetX<rX+rW && e.offsetY>rY && e.offsetY<rY+rH){
      cv.style.transition = 'opacity 0.7s';
      cv.style.opacity = '0';
      hint.style.opacity = '0';
      setTimeout(()=>{ window.location.href = 'couloir-h.html'; }, 700);
    }
  });

  function draw(){
    cx.clearRect(0,0,W,H);
    const cxW = W/2, cyH = H/2;
    const vx = cxW, vy = cyH*0.52;

    // CEILING
    cx.beginPath();
    cx.moveTo(0,0); cx.lineTo(W,0); cx.lineTo(vx,vy); cx.closePath();
    const ceilG = cx.createLinearGradient(0,0,0,vy);
    ceilG.addColorStop(0,'#181410'); ceilG.addColorStop(1,'#2a2218');
    cx.fillStyle = ceilG; cx.fill();

    // LEFT WALL
    cx.beginPath();
    cx.moveTo(0,0); cx.lineTo(0,H); cx.lineTo(W*0.2,H); cx.lineTo(vx,vy); cx.closePath();
    const lwG = cx.createLinearGradient(0,0,W*0.2,0);
    lwG.addColorStop(0,'#141008'); lwG.addColorStop(1,'#2e261a');
    cx.fillStyle = lwG; cx.fill();

    // RIGHT WALL
    cx.beginPath();
    cx.moveTo(W,0); cx.lineTo(W,H); cx.lineTo(W*0.8,H); cx.lineTo(vx,vy); cx.closePath();
    const rwG = cx.createLinearGradient(W,0,W*0.8,0);
    rwG.addColorStop(0,'#100e08'); rwG.addColorStop(1,'#281e14');
    cx.fillStyle = rwG; cx.fill();

    // FLOOR — red carpet
    cx.beginPath();
    cx.moveTo(0,H); cx.lineTo(W,H); cx.lineTo(vx,vy); cx.closePath();
    const flG = cx.createLinearGradient(0,vy,0,H);
    flG.addColorStop(0,'#2a0a0a'); flG.addColorStop(0.4,'#380e0e'); flG.addColorStop(1,'#441212');
    cx.fillStyle = flG; cx.fill();

    // perspective lines floor
    for(let i=1;i<9;i++){
      cx.beginPath(); cx.moveTo(vx,vy); cx.lineTo(W*i/9,H);
      cx.strokeStyle = 'rgba(50,12,12,0.35)'; cx.lineWidth = 0.4; cx.stroke();
    }
    for(let j=1;j<7;j++){
      const p = Math.pow(j/7,1.5), y = vy+(H-vy)*p, hw = W*0.8*p*0.5;
      cx.beginPath(); cx.moveTo(cxW-hw,y); cx.lineTo(cxW+hw,y);
      cx.strokeStyle = `rgba(42,10,10,${0.25+p*0.15})`; cx.lineWidth = 0.3; cx.stroke();
    }

    // AMBIENT LIGHT — diffuse, no visible source
    const ambG = cx.createRadialGradient(vx,vy,0,vx,vy,H*0.9);
    ambG.addColorStop(0,`rgba(200,165,100,${0.13+Math.sin(t*0.3)*0.01})`);
    ambG.addColorStop(0.25,'rgba(150,120,65,0.07)');
    ambG.addColorStop(0.6,'rgba(90,70,35,0.03)');
    ambG.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle = ambG; cx.fillRect(0,0,W,H);

    // ceiling light
    const ceilL = cx.createLinearGradient(0,0,0,vy);
    ceilL.addColorStop(0,'rgba(0,0,0,0)');
    ceilL.addColorStop(1,'rgba(180,150,85,0.08)');
    cx.fillStyle = ceilL;
    cx.beginPath(); cx.moveTo(0,0); cx.lineTo(W,0); cx.lineTo(vx,vy); cx.closePath(); cx.fill();

    // floor light
    const floorL = cx.createLinearGradient(0,vy,0,H);
    floorL.addColorStop(0,'rgba(160,80,40,0.08)');
    floorL.addColorStop(0.5,'rgba(100,45,20,0.04)');
    floorL.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle = floorL;
    cx.beginPath(); cx.moveTo(0,H); cx.lineTo(W,H); cx.lineTo(vx,vy); cx.closePath(); cx.fill();

    // wall lights
    const mwL = cx.createLinearGradient(W*0.2,0,vx,0);
    mwL.addColorStop(0,'rgba(170,135,70,0.06)'); mwL.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle = mwL;
    cx.beginPath(); cx.moveTo(0,0); cx.lineTo(0,H); cx.lineTo(W*0.2,H); cx.lineTo(vx,vy); cx.closePath(); cx.fill();

    const mwR = cx.createLinearGradient(W*0.8,0,vx,0);
    mwR.addColorStop(0,'rgba(160,125,65,0.06)'); mwR.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle = mwR;
    cx.beginPath(); cx.moveTo(W,0); cx.lineTo(W,H); cx.lineTo(W*0.8,H); cx.lineTo(vx,vy); cx.closePath(); cx.fill();

    // BLACK RECTANGLE at end — click to continue
    const rW = W*0.10, rH = H*0.18;
    const rX = vx-rW/2, rY = vy-rH*0.55;
    cx.fillStyle = '#000000'; cx.fillRect(rX,rY,rW,rH);
    cx.strokeStyle = 'rgba(60,42,20,0.5)'; cx.lineWidth = 0.8;
    cx.strokeRect(rX,rY,rW,rH);

    // VIGNETTE
    const vig = cx.createRadialGradient(cxW,cyH,H*0.05,cxW,cyH,H*0.85);
    vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.92)');
    cx.fillStyle = vig; cx.fillRect(0,0,W,H);
  }

  function loop(){ t+=0.016; resize(); draw(); requestAnimationFrame(loop); }
  loop();
})();
</script>
</body>
</html>
