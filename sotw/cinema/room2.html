<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>room 2</title>
<link rel="stylesheet" href="../css/main.css">
<style>
  body { background:#000; }
  #start {
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    color:#888;font-family:'Courier New',monospace;
    font-size:10px;letter-spacing:0.3em;
    text-transform:uppercase;cursor:pointer;z-index:10;
  }
  #exit-btn {
    display:none;
    position:fixed;
    top:47%;left:52%;
    transform:translate(-50%,-50%) rotate(-3deg);
    z-index:30;
    font-family:Arial Black,Impact,sans-serif;
    font-size:14px;font-weight:900;
    letter-spacing:0.04em;
    background:#c8c400;color:#1a0000;
    border:3px solid #880000;
    border-right:6px solid #440000;
    border-bottom:6px solid #440000;
    padding:8px 16px 10px 13px;
    cursor:pointer;text-transform:uppercase;
    box-shadow:2px 2px 0 #000,5px 5px 0 #440000;
    outline:2px dashed #ff0000;outline-offset:3px;
    white-space:nowrap;
    animation:wobble 0.2s infinite;
  }
  #exit-btn:hover{background:#ff0000;color:#ffff00;}
  @keyframes wobble{
    0%  {transform:translate(-50%,-50%) rotate(-3deg);}
    33% {transform:translate(calc(-50% + 1px),calc(-50% + 1px)) rotate(-1.5deg);}
    66% {transform:translate(calc(-50% - 1px),calc(-50% - 0.5px)) rotate(-4deg);}
    100%{transform:translate(-50%,-50%) rotate(-3deg);}
  }
</style>
</head>
<body>
  <div class="fade-cover" id="fi"></div>
  <canvas id="c"></canvas>
  <div id="start">click to start</div>
  <button id="exit-btn">▶ EXIT THIS PLACE</button>

<script>
(function(){
  const cv=document.getElementById('c'),cx=cv.getContext('2d');
  const fi=document.getElementById('fi');
  const startEl=document.getElementById('start');
  const exitBtn=document.getElementById('exit-btn');
  let W,H,t=0,started=false,startTime=null;
  let audioCtx=null,chaosNodes=[],lastTick=-1,exitShown=false;

  function resize(){W=window.innerWidth;H=window.innerHeight;cv.width=W;cv.height=H;}
  resize();
  setTimeout(()=>fi.classList.add('done'),100);

  // AUDIO
  function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();}

  function playTick(deg){
    if(!audioCtx)return;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=deg>0.5?'square':'sine';
    o.frequency.value=880+deg*200*(Math.random()-0.5);
    g.gain.setValueAtTime(0.25,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.08);
    o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.1);
    if(deg>0.3){
      const bs=audioCtx.sampleRate*0.08,b=audioCtx.createBuffer(1,bs,audioCtx.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*deg*0.5;
      const ns=audioCtx.createBufferSource(),ng=audioCtx.createGain();
      ng.gain.value=deg*0.15;ns.buffer=b;ns.connect(ng);ng.connect(audioCtx.destination);ns.start();
    }
  }

  function startChaosSound(){
    if(!audioCtx)return;
    chaosNodes.forEach(n=>{try{n.stop();}catch(e){}});chaosNodes=[];
    // drone
    const d=audioCtx.createOscillator(),dg=audioCtx.createGain();
    d.type='sawtooth';d.frequency.value=40;
    dg.gain.setValueAtTime(0,audioCtx.currentTime);
    dg.gain.linearRampToValueAtTime(0.55,audioCtx.currentTime+0.3);
    d.connect(dg);dg.connect(audioCtx.destination);d.start();chaosNodes.push(d);
    // screech
    const s=audioCtx.createOscillator(),sg=audioCtx.createGain();
    s.type='square';
    s.frequency.setValueAtTime(3400,audioCtx.currentTime);
    s.frequency.linearRampToValueAtTime(120,audioCtx.currentTime+1.5);
    s.frequency.linearRampToValueAtTime(2800,audioCtx.currentTime+3);
    sg.gain.setValueAtTime(0.2,audioCtx.currentTime);
    sg.gain.linearRampToValueAtTime(0.08,audioCtx.currentTime+4);
    s.connect(sg);sg.connect(audioCtx.destination);s.start();chaosNodes.push(s);
    // noise
    const bs=audioCtx.sampleRate*5,b=audioCtx.createBuffer(1,bs,audioCtx.sampleRate),bd=b.getChannelData(0);
    for(let i=0;i<bs;i++)bd[i]=Math.random()*2-1;
    const ns=audioCtx.createBufferSource(),ng=audioCtx.createGain(),nf=audioCtx.createBiquadFilter();
    nf.type='bandpass';nf.frequency.value=800;nf.Q.value=0.5;
    ns.buffer=b;ng.gain.setValueAtTime(0.7,audioCtx.currentTime);
    ng.gain.linearRampToValueAtTime(0.4,audioCtx.currentTime+5);
    ns.connect(nf);nf.connect(ng);ng.connect(audioCtx.destination);ns.start();chaosNodes.push(ns);
  }

  // SEATS
  function drawSeat(x,y,sw,sh,lit){
    const g=cx.createLinearGradient(x-sw/2,y-sh,x+sw/2,y);
    g.addColorStop(0,`rgb(${80+lit*70|0},${8+lit*10|0},8)`);
    g.addColorStop(1,`rgb(${32+lit*18|0},4,4)`);
    cx.beginPath();cx.moveTo(x-sw*.46,y);cx.lineTo(x+sw*.46,y);cx.lineTo(x+sw*.42,y-sh*.74);cx.lineTo(x-sw*.42,y-sh*.74);cx.closePath();cx.fillStyle=g;cx.fill();
    cx.beginPath();cx.ellipse(x,y-sh*.72,sw*.38,sh*.06,0,0,Math.PI*2);cx.fillStyle=`rgb(${68+lit*55|0},8,8)`;cx.fill();
    cx.beginPath();cx.moveTo(x-sw*.4,y-sh*.4);cx.lineTo(x+sw*.4,y-sh*.4);cx.strokeStyle=`rgba(${38+lit*28|0},4,4,.7)`;cx.lineWidth=1.3;cx.stroke();
    cx.fillStyle=`rgba(${22+lit*12|0},3,3,.95)`;cx.fillRect(x-sw*.54,y-sh*.4,sw*.1,sh*.22);cx.fillRect(x+sw*.44,y-sh*.4,sw*.1,sh*.22);
    cx.beginPath();cx.moveTo(x-sw*.46,y);cx.lineTo(x+sw*.46,y);cx.lineTo(x+sw*.46,y-sh*.2);cx.lineTo(x-sw*.46,y-sh*.2);cx.closePath();cx.fillStyle=`rgb(${48+lit*32|0},5,5)`;cx.fill();
  }
  function drawSeats(lit){
    for(let s=0;s<7;s++) drawSeat(W/7*.5+s*W/7,H*.99,W*.115,H*.34,lit);
    const b=cx.createLinearGradient(0,H*.84,0,H);b.addColorStop(0,'rgba(0,0,0,0)');b.addColorStop(1,'rgba(0,0,0,.97)');cx.fillStyle=b;cx.fillRect(0,H*.84,W,H*.16);
  }

  // COUNTDOWN
  function drawCountdown(num,spin,deg,sx,sy,sw,sh){
    cx.fillStyle=`rgb(${232+deg*20*(Math.random()-.5)|0},${224+deg*15*(Math.random()-.5)|0},${200+deg*10*(Math.random()-.5)|0})`;
    cx.fillRect(sx,sy,sw,sh);
    const ga=Math.floor(sw*sh*0.003*(1+deg*3));
    for(let i=0;i<ga;i++){const gx=sx+Math.random()*sw,gy=sy+Math.random()*sh,v=Math.random()*50|0;cx.fillStyle=`rgba(${v},${v},${v},${.1+deg*.3})`;cx.fillRect(gx,gy,2,2);}
    const cxW=sx+sw/2,cyH=sy+sh/2,R=Math.min(sw,sh)*.3;
    for(let x=sx+20;x<sx+sw;x+=40){cx.fillStyle='rgba(0,0,0,.8)';cx.beginPath();cx.ellipse(x,sy+10,7,5,0,0,Math.PI*2);cx.fill();cx.beginPath();cx.ellipse(x,sy+sh-10,7,5,0,0,Math.PI*2);cx.fill();}
    cx.beginPath();cx.arc(cxW,cyH,R,0,Math.PI*2);cx.strokeStyle='rgba(0,0,0,.7)';cx.lineWidth=2.5;cx.stroke();
    const a=-Math.PI/2+spin*Math.PI*2+deg*Math.sin(t*8)*.3;
    cx.beginPath();cx.moveTo(cxW,cyH);cx.lineTo(cxW+Math.cos(a)*R*.95,cyH+Math.sin(a)*R*.95);cx.strokeStyle='rgba(0,0,0,.75)';cx.lineWidth=2;cx.stroke();
    cx.beginPath();cx.moveTo(cxW-R,cyH+deg*Math.sin(t*5)*3);cx.lineTo(cxW+R,cyH+deg*Math.sin(t*5)*3);cx.moveTo(cxW+deg*Math.cos(t*4)*3,cyH-R);cx.lineTo(cxW+deg*Math.cos(t*4)*3,cyH+R);cx.strokeStyle='rgba(0,0,0,.4)';cx.lineWidth=1;cx.stroke();
    cx.beginPath();cx.arc(cxW,cyH,R*.2,0,Math.PI*2);cx.strokeStyle='rgba(0,0,0,.5)';cx.lineWidth=1.5;cx.stroke();
    const fs=Math.min(sw,sh)*.24;cx.font=`bold ${fs}px 'Courier New'`;cx.textAlign='center';cx.textBaseline='middle';
    if(deg>.2){cx.save();cx.globalAlpha=deg*.3;cx.fillStyle='rgba(255,0,0,.8)';cx.fillText(num,cxW+deg*6,cyH+deg*3);cx.fillStyle='rgba(0,0,255,.8)';cx.fillText(num,cxW-deg*4,cyH-deg*2);cx.restore();}
    cx.fillStyle=`rgba(0,0,0,${.85+deg*Math.sin(t*12)*.1})`;cx.fillText(num,cxW+deg*Math.sin(t*9)*3,cyH+deg*Math.cos(t*7)*2);
    const nt=Math.floor(deg*8);
    for(let i=0;i<nt;i++){const ty=sy+Math.random()*sh,th=Math.random()*4+1,sh2=(Math.random()-.5)*sw*.25*deg;cx.save();cx.drawImage(cv,sx,ty,sw,th,sx+sh2,ty,sw,th);cx.restore();}
    cx.fillStyle='rgba(0,0,0,.2)';cx.fillRect(sx,sy,22,sh);cx.fillRect(sx+sw-22,sy,22,sh);
    if(Math.random()<.03+deg*.15){cx.fillStyle=`rgba(0,0,0,${.2+Math.random()*.4})`;cx.fillRect(sx,sy,sw,sh);}
  }

  // CHAOS
  function drawChaos(age){
    const intensity=Math.min(1,age/2);
    cx.fillStyle='#000';cx.fillRect(0,0,W,H);
    const na=Math.floor(W*H*.12*intensity);
    for(let i=0;i<na;i++){const nx=Math.random()*W,ny=Math.random()*H,v=Math.random()*255;cx.fillStyle=`rgba(${v},${v*.5|0},${v*.2|0},${.4+Math.random()*.6})`;cx.fillRect(nx,ny,Math.random()*5+1,Math.random()*2+1);}
    const numT=Math.floor(5+intensity*25);
    for(let i=0;i<numT;i++){const ty=Math.random()*H,th=Math.random()*10+1,sh=(Math.random()-.5)*W*.5*intensity;cx.save();cx.drawImage(cv,0,ty,W,th,sh,ty,W,th);cx.restore();cx.fillStyle=`rgba(255,0,0,${Math.random()*.25})`;cx.fillRect(sh,ty,W,th*.5);cx.fillStyle=`rgba(0,200,255,${Math.random()*.2})`;cx.fillRect(sh+4,ty+th*.5,W,th*.5);}
    for(let i=0;i<intensity*12;i++){cx.fillStyle=`rgba(${Math.random()*255|0},${Math.random()*40|0},${Math.random()*40|0},${.3+Math.random()*.5})`;cx.fillRect(Math.random()*W,Math.random()*H,Math.random()*W*.5,Math.random()*H*.15);}
    if(Math.random()<.25){const tx=['SIGNAL LOST','ERROR','0x00000','NO CARRIER','ABORT','????'];cx.font=`${8+Math.random()*18|0}px 'Courier New'`;cx.fillStyle=`rgba(255,${Math.random()*80|0},0,${.5+Math.random()*.5})`;cx.textAlign='left';cx.textBaseline='top';cx.fillText(tx[Math.random()*tx.length|0],Math.random()*W*.6,Math.random()*H);}
    if(age<.4){cx.fillStyle=`rgba(255,255,255,${(.4-age)*2.2})`;cx.fillRect(0,0,W,H);}
    if(age>1.5){cx.save();cx.globalAlpha=Math.min(.9,(age-1.5)/2);drawSeats(0);cx.restore();}
    if(age>3&&!exitShown){exitShown=true;exitBtn.style.display='block';}
  }

  // MAIN
  function draw(){
    if(!started){cx.fillStyle='#000';cx.fillRect(0,0,W,H);return;}
    const now=performance.now()/1000;
    if(!startTime)startTime=now;
    const el=now-startTime,total=8;
    const ti=Math.floor(el),tp=el%1;
    const num=Math.max(1,total-ti);
    const deg=Math.max(0,Math.min(1,(el-2)/6));
    cx.fillStyle='#000';cx.fillRect(0,0,W,H);
    if(el<total+.5){
      if(ti!==lastTick){lastTick=ti;playTick(deg);}
      cx.fillStyle='#080604';cx.fillRect(0,0,W,H);
      const sw=W*.88,sh=sw*.52,sx=W/2-sw/2,sy=H*.02;
      cx.fillStyle='#100c06';cx.fillRect(sx-12,sy-8,sw+24,sh+16);cx.fillStyle='#060402';cx.fillRect(sx-5,sy-4,sw+10,sh+8);
      const sg=cx.createRadialGradient(W/2,sy+sh*.5,0,W/2,sy+sh,W*.85);sg.addColorStop(0,`rgba(210,${195-deg*20|0},${155-deg*40|0},${.08+deg*.06})`);sg.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=sg;cx.fillRect(0,0,W,H);
      drawCountdown(num,tp,deg,sx,sy,sw,sh);
      drawSeats(.10+deg*.05);
      const v=cx.createRadialGradient(W/2,H*.32,H*.1,W/2,H*.5,H*.85);v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,.86)');cx.fillStyle=v;cx.fillRect(0,0,W,H);
    } else {
      const ca=el-total-.5;
      if(ca<.1&&ca>=0)startChaosSound();
      drawChaos(ca);
    }
  }

  exitBtn.addEventListener('click',()=>{
    chaosNodes.forEach(n=>{try{n.stop();}catch(e){}});
    window.location.href='hallway.html';
  });

  document.addEventListener('click',()=>{
    if(!started){initAudio();started=true;startEl.style.display='none';}
  },{once:true});

  function loop(){t+=.016;resize();draw();requestAnimationFrame(loop);}
  loop();
})();
</script>
</body>
</html>
