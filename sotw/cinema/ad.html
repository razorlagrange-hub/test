    opacity:0;

  #dialogBox {
    position:fixed;
    bottom:10%;left:50%;

    background:#0a0908;
    border:2px solid #4a4a4a;

    padding:16px 18px;

    font-size:13px;
    line-height:1.6;
    color:#e8e0d0;
    letter-spacing:.02em;
    white-space:pre-wrap;

  #videoWrap {
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    z-index:5;
    opacity:0;
    transition:opacity 1s ease;
    background:#000;
  }
  #videoWrap.show { opacity:1; }
  #videoWrap video { width:100%;height:100%;object-fit:cover; }

  #back {
    position:fixed;
    bottom:5%;right:5%;
    color:rgba(255,255,255,0.25);
    font-size:9px;letter-spacing:0.25em;
    text-transform:uppercase;
    cursor:pointer;z-index:30;
    text-decoration:none;
    font-family:'Courier New',monospace;
    opacity:0;transition:opacity 0.5s,color 0.3s;
  }
  #back.show { opacity:1; }
  #back:hover { color:rgba(255,255,255,0.7); }

  <a id="back" href="../hub.html">← hub</a>

<script>
(function(){
  const fi=document.getElementById('fi');
  const svgWrap=document.getElementById('svgWrap');
  const dialogBox=document.getElementById('dialogBox');
  const ledGlow=document.getElementById('ledGlow');
  const handset=document.getElementById('handset');
  const videoWrap=document.getElementById('videoWrap');
  const vid=document.getElementById('vid');
  const back=document.getElementById('back');

  let audioCtx=null,t=0;
  let lastBlink=0,blinkState=false,nextBlink=1;

  setTimeout(()=>fi.classList.add('done'),100);
  setTimeout(()=>svgWrap.classList.add('show'),600);

  // init audio
  function initAudio(){
    if(audioCtx)return;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }
  // auto-init if coming from hub with audio
  if(new URLSearchParams(window.location.search).get('audio')==='1'){
    try{initAudio();}catch(e){}
  }

  function playBlip(i){
    if(!audioCtx)return;
    const freq=130+((i*37)%9)*14;
    const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
    osc.type='square';osc.frequency.value=freq;
    gain.gain.setValueAtTime(0.045,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.045);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start();osc.stop(audioCtx.currentTime+0.05);
  }

  function typeLine(line, onDone){
    initAudio();
    dialogBox.style.opacity='1';
    dialogBox.textContent='';
    let i=0;
    function step(){
      if(i<line.length){
        const ch=line[i];
        dialogBox.textContent+=ch;
        if(ch!==' ')playBlip(i);
        i++;
        setTimeout(step,28+Math.random()*14);
      } else {
        if(onDone) setTimeout(onDone, Math.max(2500, line.length*65));
      }
    }
    step();
  }

  // sequence: intercom appears → speaks → video launches
  setTimeout(()=>{
    typeLine('A commercial break will now play.', ()=>{
      // fade out dialog and intercom
      dialogBox.style.opacity='0';
      svgWrap.style.opacity='0';
      setTimeout(()=>{
        vid.muted=false;
        vid.volume=0.5;
        vid.play();
        videoWrap.classList.add('show');
        setTimeout(()=>back.classList.add('show'),4000);
      },800);
    });
  },1200);

  // LED blink
  function updatePhone(){
    const now=t;
    if(now-lastBlink>nextBlink){
      blinkState=!blinkState;lastBlink=now;
      nextBlink=blinkState?(0.05+Math.random()*0.15):(0.5+Math.random()*3);
    }
    ledGlow.style.opacity=blinkState?'1':'0.15';
    const tx=Math.sin(now*5.1)*0.12,ty=Math.cos(now*4.3)*0.1;
    svgWrap.style.transform=`translate(calc(-50% + ${tx}px), calc(-60% + ${ty}px))`;
    const ht=Math.sin(now*9.4)*0.08;
    handset.setAttribute('transform',`translate(${ht},0)`);
  }

  function loop(){t+=0.016;updatePhone();requestAnimationFrame(loop);}
  loop();
})();
</script>
